<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Come See Sebasss!</title>

<!-- Font Awesome (Facebook icon) -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

 /* ===== BUTTON ROW ===== */
.button-row {
    display: flex;
    justify-content: space-between;
    gap: 15px;
    margin-top: 30px;
    flex-wrap: wrap;
}

/* ===== BASE BUTTON STYLE ===== */
.btn {
    flex: 1;
    text-align: center;
    padding: 15px 10px;
    border-radius: 12px;
    font-weight: bold;
    text-decoration: none;
    font-size: 18px;
    transition: 0.3s;
    color: white;
}

/* ===== COLORS ===== */
.call {
    background: #1f7a1f;
}

.text {
    background: #0066cc;
}

.email {
    background: #444;
}

.fb {
    background: #1877f2;
}

/* ===== HOVER EFFECT ===== */
.btn:hover {
    transform: scale(1.05);
    opacity: 0.9;
}
    


/* ===== BODY ===== */
body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background-image:url("SEBB.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    color:white;
}

/* ===== OVERLAY ===== */
.overlay{
    min-height:100vh;
    background:rgba(0,0,0,.45);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===== CONTENT BOX ===== */
.content{
    width:90%;
    max-width:700px;
    background:rgba(31,47,87,.80);
    padding:40px 40px 50px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 25px black;
}

/* ===== HEADINGS ===== */
h1{
    margin-top:0;
    font-size:52px;
    color:white;
}

h2{
    margin-top:-10px;
    color:#ffffff;
    font-weight:normal;
}

/* ===== INFO TEXT ===== */
.info{
    margin-top:35px;
    font-size:22px;
    line-height:2;
}

/* ===== BUTTONS ===== */
a{
    display:inline-block;
    background:white;
    color:#0039A6;
    padding:15px 30px;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    text-decoration:none;
    margin:10px;
    transition:.3s;
}

a:hover{
    background:#d8e8ff;
    transform:scale(1.05);
}

/* ===== FACEBOOK ICON ===== */
.facebook{
    font-size:30px;
    margin-right:10px;
}

.map-section {
    margin-top: 40px;
    text-align: center;
}

.map-section h3 {
    font-size: 24px;
    margin-bottom: 10px;
}

.map-section p {
    font-size: 16px;
    margin-bottom: 15px;
    opacity: 0.9;
}
 
</style>

</head>

<body>

<div class="overlay">

<div class="content">

<h1>Come See Sebasss</h1>

<h2>Sebastian Davila</h2>

<div class="info">

<div class="button-row">

    <a href="tel:+12544502783" class="btn call">Call</a>

    <a href="sms:+12544502783" class="btn text">Text</a>

    <a href="mailto:sdavila@killeenauto.com" class="btn email">Email</a>

    <a href="https://www.facebook.com/share/1DVJFEeLbL/?mibextid=wwXIfr" target="_blank" class="btn fb">Facebook</a>

</div>
    
<p>
📍 3221 E Central Texas Expressway<br>
Killeen, TX 76543
</p>

</div>
<div class="map-section">

    <h3>Visit Us</h3>

    <p>3221 E Central Texas Expressway, Killeen, TX 76543</p>

    <iframe

        width="100%"

</div>
</div>

</div>
