<style>

 /* ===== BUTTON ROW ===== */
.button-row{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:30px;
    flex-wrap:wrap;
}

/* ===== BASE BUTTON STYLE ===== */
.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width:50px;   /* ~30% smaller than 70px */
    height:50px;
    border-radius:14px;
    background:#b8b8b8;
    transition:0.3s;
}

 .btn i{
    font-size:36px;
}

/* ===== COLORS ===== */
.call i{
    color:#25d366;
}

.text i{
    color:#4aa3ff;
}

.email i{
    color:#ffffff;
}

.fb i{
    color:#1877f2;
}

/* ===== HOVER EFFECT ===== */
.btn:hover {
    transform: scale(1.05);
    opacity: 0.9;
}
    


/* ===== BODY ===== */
body{
    margin:0;
    padding:0;
    font-family:'Poppins', sans-serif;
    background-image:url("SEBGTI.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    color:white;
}

/* ===== OVERLAY ===== */
.overlay{
    min-height:100vh;
    background:rgba(0,0,0,.45);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===== CONTENT BOX ===== */
.content{
    width:90%;
    max-width:700px;
    background:rgba(31,47,87,.85);
    padding:40px 40px 50px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 25px black;
}

/* ===== HEADINGS ===== */
h1{
    font-family:'Great Vibes', cursive;
    font-size:72px;
    font-weight:400;
    color:white;
    text-shadow:2px 2px 8px rgba(0,0,0,.6);
}
 
h3{
    font-size:26px;
    font-weight:600;
    margin-top:10px;
    margin-bottom:10px;
}

.hashtag{
    margin-top:30px;
    font-size:16px;
    color:rgba(255,255,255,.8);
    font-style:italic;
    letter-spacing:1px;
    font-weight:normal;
    letter-spacing:1px;
}

/* ===== INFO TEXT ===== */
.info, .map-section, .hashtag, a, p, h3 {
    font-family:'Poppins', sans-serif;
}

/* ===== BUTTONS ===== */
a{
    display:inline-block;
    background:white;
    color:#0039A6;
    padding:15px 30px;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    text-decoration:none;
    margin:10px;
    transition:.3s;
}

a:hover{
    background:#d8e8ff;
    transform:scale(1.05);
}

/* ===== FACEBOOK ICON ===== */
.facebook{
    font-size:30px;
    margin-right:10px;
}

.map-section {
    margin-top: 40px;
    text-align: center;
}

.map-section h3 {
    font-size: 24px;
    margin-bottom: 10px;
}

.map-section p {
    font-size: 16px;
    margin-bottom: 15px;
    opacity: 0.9;
}

@media (max-width: 600px){
    h1{
        font-size:44px;
        line-height:1.1;
    }
}
 
 @media (max-width: 600px){

   .button-row{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:30px;
    flex-wrap:nowrap;   /* IMPORTANT */
}

    .btn{
        width:60px;
        height:60px;
        font-size:22px;
        border-radius:14px;
    }
}

 @media (max-width: 600px){
    .btn{
        width:45px;
        height:45px;
    }

    .btn i{
        font-size:28px;
    }

    .button-row{
        gap:10px;
    }
}
 
     .btn i{
    line-height:1;
}
 
</style>

</head>

<body>

<div class="overlay">

<div class="content">

<h1>Sebastian Davila</h1>

<div class="info">

<div class="button-row">

    <i class="fa-solid fa-phone"></i>
</a>

<a href="sms:+12544502783" class="btn text">
    <i class="fa-solid fa-comment-sms"></i>
</a>

<a href="mailto:sdavila@killeenauto.com" class="btn email">
    <i class="fa-solid fa-envelope"></i>
</a>

<a href="https://www.facebook.com/share/1DVJFEeLbL/?mibextid=wwXIfr" target="_blank" class="btn fb">
    <i class="fa-brands fa-facebook-f"></i>
</a>

</div>
    


</div>
<div class="map-section">

    <h3>Come See Me</h3>

    <iframe

        width="100%"
